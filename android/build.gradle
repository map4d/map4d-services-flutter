group 'vn.map4d.services.map4d_services'
version '1.0'

buildscript {
    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
    }
}

rootProject.allprojects {
    repositories {
        google()
        maven {
            url = "https://packages.map4d.vn/repository/maven-public"
        }
    }
}

apply plugin: 'com.android.library'

android {
    namespace "vn.map4d.services.map4d_services"
    compileSdkVersion 33
    defaultConfig {
        minSdkVersion 21
    }
}

dependencies {
    implementation 'vn.map4d:Map4dServices:2.3.+'
}
